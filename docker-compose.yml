networks:
  fragvault-network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fragvault
      POSTGRES_PASSWORD: fragvault123
      POSTGRES_DB: fragvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fragvault-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fragvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://fragvault:fragvault123@postgres:5432/fragvault
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fragvault-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend
    networks:
      - fragvault-network

volumes:
  postgres_data:
